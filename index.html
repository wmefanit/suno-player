<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suno Player</title>
  <meta name="twitter:card" content="player">
  <meta name="twitter:title" content="Suno Song">
  <meta name="twitter:player:width" content="480">
  <meta name="twitter:player:height" content="600">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css">
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
    #wrap { width: 90%; max-width: 480px; background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    #lyrics-box { width: 90%; max-width: 480px; background: #1e1e1e; padding: 20px; border-radius: 12px; white-space: pre-wrap; line-height: 1.6; font-size: 15px; color: #ccc; }
    .aplayer { background: #2a2a2a !important; color: #fff !important; }
    /* 隐藏 APlayer 自带的那一行滚动歌词 */
    .aplayer-lrc { display: none !important; }
  </style>
</head>
<body>
  <div id="wrap"><div id="player"></div></div>
  <div id="lyrics-box">加载歌词中...</div>
  <script src="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const songId = params.get('id');
    if (!songId) { document.body.innerHTML='<h3 style="text-align:center;margin-top:40vh">请提供 ?id=歌曲ID</h3>'; throw new Error('no id'); }

    fetch('https://studio-api.prod.suno.com/api/clip/' + songId)
      .then(r => r.json())
      .then(data => {
        const title = data.title || 'Untitled';
        const audio  = data.audio_url || 'https://cdn1.suno.ai/' + songId + '.mp3';
        const cover = 'https://cdn1.suno.ai/image_' + songId + '.jpeg';
        const prompt = (data.metadata && data.metadata.prompt) || '暂无歌词';

        document.title = title + ' - Suno';
        
        // 更新全文歌词框
        document.getElementById('lyrics-box').textContent = prompt;

        // 动态修改 Twitter Card 的标题，让 X 抓取时使用真实歌名
        let tMeta = document.querySelector('meta[name="twitter:title"]');
        if (tMeta) tMeta.content = title;

        new APlayer({
          container: document.getElementById('player'),
          audio: [{ name: title, artist: 'Suno', url: audio, cover: cover, theme: '#ffa500' }]
        });
      })
      .catch(e => { document.body.innerHTML = '<h3 style="text-align:center;margin-top:40vh">加载失败</h3>'; });
  </script>
</body>
</html>
